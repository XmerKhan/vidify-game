<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a2e28"/>
      <stop offset="0.5" stop-color="#108a72"/>
      <stop offset="1" stop-color="#0a4a3e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- decorative grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>
  <!-- game card icons -->
  <g>
    <rect x="120" y="180" width="140" height="140" rx="20" fill="url(#card)" stroke="#4ade80" stroke-opacity="0.4" stroke-width="2"/>
    <text x="190" y="262" font-family="system-ui,sans-serif" font-size="52" fill="#4ade80" text-anchor="middle" font-weight="bold">$</text>
  </g>
  <g>
    <rect x="290" y="180" width="140" height="140" rx="20" fill="url(#card)" stroke="#60a5fa" stroke-opacity="0.4" stroke-width="2"/>
    <text x="360" y="262" font-family="monospace" font-size="44" fill="#60a5fa" text-anchor="middle" font-weight="bold">&lt;/&gt;</text>
  </g>
  <g>
    <rect x="460" y="180" width="140" height="140" rx="20" fill="url(#card)" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="2"/>
    <text x="530" y="262" font-family="system-ui,sans-serif" font-size="44" fill="#fbbf24" text-anchor="middle" font-weight="bold">ABC</text>
  </g>
  <g>
    <rect x="630" y="180" width="140" height="140" rx="20" fill="url(#card)" stroke="#f472b6" stroke-opacity="0.4" stroke-width="2"/>
    <text x="700" y="262" font-family="system-ui,sans-serif" font-size="44" fill="#f472b6" text-anchor="middle" font-weight="bold">123</text>
  </g>
  <!-- brand text -->
  <text x="600" y="430" font-family="system-ui,-apple-system,sans-serif" font-size="68" fill="#ffffff" text-anchor="middle" font-weight="800">Vidify Games</text>
  <text x="600" y="480" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#a7f3d0" text-anchor="middle" font-weight="500">Learn While You Play</text>
  <text x="600" y="540" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#6ee7b7" text-anchor="middle" font-weight="400">Free browser-based educational games</text>
</svg>
